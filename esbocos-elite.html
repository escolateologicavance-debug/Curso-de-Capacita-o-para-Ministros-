<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esboços de Elite - Ministro Classe A</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002147; --gold: #d4af37; --paper: #f4f1ea; --ink: #1a1a1a; }
        body { background: var(--blue); color: var(--paper); font-family: 'Lato', sans-serif; margin: 0; padding: 20px; }
        
        .nav-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); padding-bottom: 15px; margin-bottom: 25px; }
        .btn-back { color: var(--gold); text-decoration: none; font-family: 'Cinzel'; font-size: 0.8rem; }
        
        h2 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; margin: 0; font-size: 1.2rem; }

        /* Barra de Pesquisa Estilizada */
        .search-container { position: relative; margin: 20px 0; }
        .search-box {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--gold);
            color: var(--paper);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }
        .search-box:focus { background: rgba(255,255,255,0.1); box-shadow: 0 0 10px rgba(212,175,55,0.3); }

        .lista-esbocos { display: flex; flex-direction: column; gap: 15px; }

        .esboco-card {
            background: var(--paper);
            color: var(--ink);
            padding: 20px;
            border-radius: 4px;
            border-left: 5px solid var(--gold);
            cursor: pointer;
            transition: 0.3s;
            animation: fadeIn 0.5s ease-out;
        }

        .esboco-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .tema { font-family: 'Cinzel', serif; font-weight: bold; font-size: 0.9rem; display: block; color: var(--blue); margin-bottom: 5px; }
        .referencia { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.8rem; color: #666; }

        /* Modal do Esboço */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--blue);
            z-index: 1000;
            overflow-y: auto;
            padding: 15px;
            box-sizing: border-box;
        }

        .pergaminho {
            background: var(--paper);
            color: var(--ink);
            padding: 30px;
            min-height: 100%;
            border-radius: 4px;
            position: relative;
        }

        .corpo-esboco { font-family: 'Playfair Display', serif; line-height: 1.7; font-size: 1.1rem; }
        .corpo-esboco h4 { font-family: 'Cinzel'; color: var(--blue); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0; }
        
        .btn-close { 
            background: var(--blue); color: var(--paper); border: none; 
            padding: 10px 20px; font-family: 'Cinzel'; cursor: pointer; 
            margin-bottom: 20px; border-radius: 4px; width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="btn-back">← Gabinete</a>
        <span style="font-family: 'Cinzel'; font-size: 0.6rem; color: var(--gold);">Acervo Homilético</span>
    </div>

    <h2>Esboços de Elite</h2>
    
    <div class="search-container">
        <input type="text" id="campoBusca" class="search-box" placeholder="Ex: Oração, Doutrina, Ceia..." onkeyup="filtrar()">
    </div>

    <div class="lista-esbocos" id="lista">
        <!-- Esboço 1 -->
        <div class="esboco-card" onclick="abrirEsboco('esboco1')">
            <span class="tema">A Eficácia da Oração Ministerial</span>
            <span class="referencia">Tiago 5:16 | Vida Espiritual</span>
        </div>
        <!-- Esboço 2 -->
        <div class="esboco-card" onclick="abrirEsboco('esboco2')">
            <span class="tema">O Caráter do Ministro Aprovado</span>
            <span class="referencia">2 Timóteo 2:15 | Doutrina</span>
        </div>
        <!-- Esboço 3 -->
        <div class="esboco-card" onclick="abrirEsboco('esboco3')">
            <span class="tema">A Soberania no Governo da Igreja</span>
            <span class="referencia">Salmos 115:3 | Gestão Teísta</span>
        </div>
    </div>

    <div id="modalEsboco" class="modal">
        <div class="pergaminho">
            <button class="btn-close" onclick="fecharEsboco()">Fechar Esboço</button>
            <div id="conteudo-dinamico" class="corpo-esboco"></div>
        </div>
    </div>

    <script>
        const dadosEsbocos = {
            esboco1: `
                <h4>A Eficácia da Oração Ministerial</h4>
                <p><i>Texto: Tiago 5:16</i></p>
                <p><b>Introdução:</b> A oração não é um preparo para o trabalho; a oração É o trabalho do Ministro.</p>
                <p><b>I. A Oração que Move o Trono:</b> Fé e fervor no gabinete.</p>
                <p><b>II. Blindagem Emocional:</b> Como a oração previne o esgotamento (Burnout).</p>
                <p><b>III. Intercessão pelo Rebanho:</b> O papel do sacerdote intercessor.</p>
                <p><b>Conclusão:</b> Menos métodos humanos, mais dependência divina.</p>
            `,
            esboco2: `
                <h4>O Caráter do Ministro Aprovado</h4>
                <p><i>Texto: 2 Timóteo 2:15</i></p>
                <p><b>Introdução:</b> A autoridade no púlpito nasce da integridade no secreto.</p>
                <p><b>I. O Manejo da Verdade:</b> Exegese pura e sem artifícios.</p>
                <p><b>II. A Vida Irrepreensível:</b> O decoro como escudo do ministério.</p>
                <p><b>III. Ética e Honra:</b> Devolver a glória a Deus e a honra aos superiores.</p>
                <p><b>Conclusão:</b> Seja um obreiro que não tem de que se envergonhar.</p>
            `,
            esboco3: `
                <h4>A Soberania no Governo da Igreja</h4>
                <p><i>Texto: Salmos 115:3</i></p>
                <p><b>Introdução:</b> Administrar a igreja é reconhecer que o dono do rebanho é o Mestre.</p>
                <p><b>I. Decisões sob Consulta:</b> Oração antes da assembleia.</p>
                <p><b>II. Providência e Recursos:</b> Deus sustenta o que Ele ordena.</p>
                <p><b>III. O Descanso do Líder:</b> Se Deus governa, o Ministro pode dormir em paz.</p>
            `
        };

        function abrirEsboco(id) {
            document.getElementById('conteudo-dinamico').innerHTML = dadosEsbocos[id];
            document.getElementById('modalEsboco').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Trava o scroll do fundo
        }

        function fecharEsboco() {
            document.getElementById('modalEsboco').style.display = 'none';
            document.body.style.overflow = 'auto'; // Destrava o scroll
        }

        function filtrar() {
            let termo = document.getElementById('campoBusca').value.toLowerCase();
            let cards = document.querySelectorAll('.esboco-card');
            
            cards.forEach(card => {
                let textoNoCard = card.innerText.toLowerCase();
                // Verifica se o termo pesquisado existe no texto do card
                if (textoNoCard.includes(termo)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
