<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministro Classe A - Caderneta Digital</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#002147">
    <link rel="apple-touch-icon" href="logo-192.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --oxford-blue: #002147;
            --gold-leaf: #d4af37;
            --parchment: #f4f1ea;
        }

        body {
            background-color: var(--oxford-blue);
            color: var(--parchment);
            font-family: 'Lato', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            animation: fadeIn 1s ease-in;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--gold-leaf);
            background: linear-gradient(180deg, #002147 0%, #00142b 100%);
        }

        .logo-container img {
            width: 90px;
            filter: drop-shadow(0 0 8px var(--gold-leaf));
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--gold-leaf);
            margin: 0;
            letter-spacing: 2px;
        }

        .paz-saudacao {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            margin-top: 10px;
            color: var(--parchment);
            opacity: 0.8;
        }

        main {
            padding: 25px;
            flex: 1;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 10px;
            text-align: center;
            border-radius: 4px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .card:active {
            background: rgba(212, 175, 55, 0.15);
            transform: scale(0.96);
            border-color: var(--gold-leaf);
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--gold-leaf);
        }

        .ft-avance { font-family: 'Cinzel'; color: var(--gold-leaf); display: block; margin-bottom: 5px; font-size: 0.85rem; }
        .slogan { font-family: 'Playfair Display'; font-style: italic; display: block; margin-bottom: 15px; }
        
        .btn-cursos {
            display: inline-block;
            background: var(--gold-leaf);
            color: var(--oxford-blue);
            padding: 10px 15px;
            text-decoration: none;
            font-family: 'Cinzel';
            font-weight: bold;
            font-size: 0.7rem;
            border-radius: 3px;
            margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo-192.png" alt="Insignia Ministerial">
    </div>
    <h1>Ministro Classe A</h1>
    <div class="paz-saudacao">A Paz do Senhor, Ministro</div>
</header>

<main>
    <div class="menu-grid">
        <a href="agenda-liturgica.html" class="card">
            <span class="card-title">Agenda<br>Litúrgica</span>
        </a>
        <a href="esbocos-elite.html" class="card">
            <span class="card-title">Esboços<br>de Elite</span>
        </a>
        <a href="saude-emocional.html" class="card">
            <span class="card-title">Saúde do<br>Obreiro</span>
        </a>
        <a href="mentoria-gestao.html" class="card">
            <span class="card-title">Gestão de<br>Mentoria</span>
        </a>
        <!-- Novos Eixos Arraigados -->
        <a href="governo-eclesiastico.html" class="card">
            <span class="card-title">Governo<br>Eclesiástico</span>
        </a>
        <a href="hermeneutica-oratoria.html" class="card">
            <span class="card-title">Hermenêutica<br>e Oratória</span>
        </a>
    </div>
</main>

<footer>
    <span class="ft-avance">Faculdade Teológica AVANCE</span>
    <span class="slogan">ultrapassando limites!</span>
    <div style="font-size: 0.6rem; opacity: 0.7; margin-bottom: 15px;">
        Made in Brasil
    </div>
    <a href="https://drive.google.com/drive/folders/15uF-Yiufhnj8ZbYEE3gcO7-GX9ItObIV">Adquirir outros Cursos</a></footer>

<script>
    // Registro do Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
            .then(reg => console.log("Gabinete Digital Online:", reg.scope))
            .catch(err => console.log("Falha no Gabinete:", err));
        });
    }

    // Sistema Sentinela Matinal
    function sentinelaMatinal() {
        const mensagens = [
            "A Paz do Senhor, Ministro. Hoje, sua autoridade no altar nasce da sua submissão no secreto.",
            "A Paz do Senhor, Ministro. Governe com ordem e decência; o Senhor é o dono da Seara.",
            "A Paz do Senhor, Ministro. Proteja sua casa hoje; ela é o seu quartel-general espiritual."
        ];
        const randomMsg = mensagens[Math.floor(Math.random() * mensagens.length)];
        
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    new Notification("Sentinela Matinal", { body: randomMsg, icon: "logo-192.png" });
                }
            });
        }
    }
    window.onload = sentinelaMatinal;
</script>

</body>
</html>
